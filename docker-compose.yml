version: "3.8"

services:

  postgres:
    image: postgres:15
    container_name: retailmax_db
    environment:
      POSTGRES_DB: retailmax
      POSTGRES_USER: retailmax_user
      POSTGRES_PASSWORD: retailmax_pass
    volumes:
      - ./init:/docker-entrypoint-initdb.d
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - retailmax_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retailmax_user -d retailmax"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  metabase:
    image: metabase/metabase:latest
    container_name: retailmax_metabase
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase_app
      MB_DB_PORT: 5432
      MB_DB_USER: retailmax_user
      MB_DB_PASS: retailmax_pass
      MB_DB_HOST: postgres
    volumes:
      - ./metabase-data:/metabase-data
    ports:
      - "3000:3000"
    networks:
      - retailmax_net

networks:
  retailmax_net:
    driver: bridge

volumes:
  pg_data: